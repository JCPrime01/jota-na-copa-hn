<script>

  },
  {
    f1:'🇬🇭', t1:'Gana',    a1:'GHA',
    f2:'🇵🇦', t2:'Panamá',  a2:'PAN',
    time:'20:00', phase:'Fase de Grupos · Rodada 1',
    market:'ODD 100', oddOld:'???', odd:'???', locked:true
  },
  {
    f1:'🇺🇿', t1:'Uzbequistão', a1:'UZB',
    f2:'🇨🇴', t2:'Colômbia',   a2:'COL',
    time:'23:00', phase:'Fase de Grupos · Rodada 1',
    market:'ODD 100', oddOld:'???', odd:'???', locked:true
  },
];

/* ── RENDER MATCH CARDS ── */
const cardsEl = document.getElementById('matchCards');
matches.forEach((m, i) => {
  const isLocked = m.locked;
  const card = document.createElement('div');
  card.className = `match-card reveal rd${(i % 3) + 1}${isLocked ? ' locked' : ''}`;
  card.innerHTML = `
    <div class="match-tournament">
      ⚽ Copa do Mundo FIFA™️
      <span class="match-phase">${m.phase}</span>
    </div>
    <div class="match-teams">
      <div class="team">
        <span class="team-flag">${m.f1}</span>
        <span class="team-name">${m.t1}</span>
        <span class="team-abbr">${m.a1}</span>
      </div>
      <div class="vs-block">
        <span class="vs-text">VS</span>
        <span class="match-time">${m.time}</span>
      </div>
      <div class="team">
        <span class="team-flag">${m.f2}</span>
        <span class="team-name">${m.t2}</span>
        <span class="team-abbr">${m.a2}</span>
      </div>
    </div>
    <div class="match-odds">
      <div class="odd-left">
        <span class="odd-label">Mercado</span>
        <span class="odd-market-tag">🎯 ${m.market}</span>
      </div>
      <div class="odd-right">
        <div class="lock-icon">${isLocked ? '🔒' : '✅'}</div>
        <div>
          <div class="odd-from">
            <span class="odd-striked">${m.oddOld}</span>
          </div>
          <div class="odd-big${isLocked ? ' gradient-text' : ''}">${m.odd}</div>
          <div class="odd-big-label">odd atual</div>
        </div>
      </div>
    </div>
    ${`<div style="margin-top:16px;text-align:center">
      <a href="https://smartico-dash.up.railway.app/track/2b978e7e-ce0e-4a1e-bdb7-5b29d12ac761/redirect?utm_campaign=esportiva" onclick="fbq('track', 'CompleteRegistration');" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#229ED9,#1A7FC1);color:#fff;font-size:13px;font-weight:800;padding:11px 28px;border-radius:999px;text-decoration:none;letter-spacing:0.5px;box-shadow:0 0 24px rgba(34,158,217,0.4);">
        🔓 REVELAR ODD NO TELEGRAM
      </a>
    </div>`}
  `;
  cardsEl.appendChild(card);
});

/* ── TICKER ── */
const tickerData = [
  { f1:'🇵🇹', t1:'Portugal',     f2:'🇨🇩', t2:'RD Congo',  time:'14:00' },
  { f1:'🇬🇧', t1:'Inglaterra',  f2:'🇭🇷', t2:'Croácia',   time:'17:00' },
  { f1:'🇬🇭', t1:'Gana',         f2:'🇵🇦', t2:'Panamá',    time:'20:00' },
  { f1:'🇺🇿', t1:'Uzbequistão',  f2:'🇨🇴', t2:'Colômbia',  time:'23:00' },
];
const inner = document.getElementById('tickerInner');
let tickerHTML = '';
// duplicate 4× for seamless loop
for (let r = 0; r < 4; r++) {
  tickerData.forEach(m => {
    tickerHTML += `
      <div class="ticker-item">
        <span class="ticker-flag">${m.f1}</span>
        <span class="ticker-teams">${m.t1}</span>
        <span class="ticker-vs">vs</span>
        <span class="ticker-teams">${m.t2}</span>
        <span class="ticker-flag">${m.f2}</span>
        <span class="ticker-time">${m.time}</span>
      </div><div class="ticker-sep"></div>`;
  });
}
inner.innerHTML = tickerHTML;

inner.addEventListener('mouseenter', () => inner.style.animationPlayState = 'paused');
inner.addEventListener('mouseleave', () => inner.style.animationPlayState = 'running');

/* ── SCROLL REVEAL ── */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

/* ── NAV SHADOW ── */
window.addEventListener('scroll', () => {
  document.querySelector('nav').style.boxShadow =
    window.scrollY > 40 ? '0 4px 28px rgba(0,0,0,0.7)' : 'none';
}, { passive: true });
</script>
</body>
</html>
